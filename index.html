const LangContext = React.createContext();

// ─── INITIAL MATCHES GENERATION ───────────────────────────────
const initialMatches = [];
const monthOrder = { "Jun": 6, "Jul": 7 };
const venuesList = [
  "Guadalajara", "Vancouver", "Seattle", "Los Angeles", "Houston",
  "Dallas", "Kansas City", "Atlanta", "Miami", "Toronto", "Boston",
  "Philadelphia", "New York", "San Francisco", "Monterrey", "Mexico City"
];

let vIdx = 0;
let currentDay = 11;
let currentMonth = "Jun";

Object.keys(GROUPS_RAW).forEach((gKey, gIdx) => {
  const teams = GROUPS_RAW[gKey];
  const pairings = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
  
  pairings.forEach((pair, pIdx) => {
    if (pIdx > 0 && pIdx % 2 === 0) {
      currentDay++;
      if (currentDay > 30) { currentDay = 1; currentMonth = "Jul"; }
    }
    const venue = venuesList[vIdx % venuesList.length];
    vIdx++;
    
    const hour = 14 + ((pIdx + gIdx) % 3) * 3;
    const timeStr = `${hour}:00`;
    
    initialMatches.push({
      id: `${gKey}-${pIdx}`,
      groupKey: gKey,
      home: teams[pair[0]],
      away: teams[pair[1]],
      hg: null,
      ag: null,
      date: `${currentDay} ${currentMonth}`,
      time: timeStr,
      venue: venue
    });
  });
});

// ─── MAIN APP COMPONENT ───────────────────────────────────────
function App() {
  const [lang, setLang] = useState("ar");
  const [activeTab, setActiveTab] = useState("groups");
  const [matches, setMatches] = useState(initialMatches);

  const t = T[lang];

  const updateScore = (id, field, val) => {
    setMatches(prev => prev.map(m => {
      if(m.id === id) {
        const n = val === "" ? null : parseInt(val);
        return { ...m, [field]: isNaN(n) ? null : n };
      }
      return m;
    }));
  };

  return (
    <LangContext.Provider value={[lang, setLang]}>
      <style>{CSS_VARS}</style>
      <div dir={t.dir}>
        
        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:12 }}>
          <h1 style={{ fontSize:22, fontWeight:800, letterSpacing:-0.5 }}>{t.title}</h1>
          <select className="lang-select" value={lang} onChange={e => setLang(e.target.value)}>
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="tr">Türkçe</option>
          </select>
        </div>

        {/* Navigation */}
        <div className="tabs-nav">
          <button className={`tab-btn ${activeTab==='groups'?'active':''}`} onClick={()=>setActiveTab('groups')}>{t.groups}</button>
          <button className={`tab-btn ${activeTab==='bracket'?'active':''}`} onClick={()=>setActiveTab('bracket')}>{t.bracket}</button>
          <button className={`tab-btn ${activeTab==='schedule'?'active':''}`} onClick={()=>setActiveTab('schedule')}>{t.schedule}</button>
          <button className={`tab-btn ${activeTab==='about'?'active':''}`} onClick={()=>setActiveTab('about')}>{t.about}</button>
        </div>

        {/* Tab Contents */}
        <div>
          {activeTab === 'groups' && <GroupsTab matches={matches} updateScore={updateScore} />}
          {activeTab === 'bracket' && <BracketTab matches={matches} />}
          {activeTab === 'schedule' && <ScheduleTab matches={matches} />}
          {activeTab === 'about' && <AboutTab />}
        </div>

      </div>
    </LangContext.Provider>
  );
}

// ─── SCHEDULE TAB ─────────────────────────────────────────────
function ScheduleTab({ matches }) {
  const [lang] = React.useContext(LangContext);
  const t = T[lang];

  // دالة تصنيف وترتيب السطور تصاعدياً بشكل رياضي دقيق
  const parseSort = (dateStr, timeStr) => {
    const [d, mo] = dateStr.split(" ");
    const dayNum = parseInt(d, 10);
    const monthNum = monthOrder[mo] || 6;
    const [h, mi] = timeStr.split(":").map(Number);
    return (monthNum * 10000) + (dayNum * 100) + h + (mi / 60);
  };

  const sorted = [...matches].sort((a,b) => parseSort(a.date, a.time) - parseSort(b.date, b.time));
  const upcoming = sorted.filter(m => m.hg === null);
  const played = sorted.filter(m => m.hg !== null);

  return (
    <div style={{ background:"var(--surface)", borderRadius:12, border:"1px solid var(--border)", overflow:"hidden", display:"flex", flexDirection:"column" }}>
      {upcoming.map((m,i) => <MatchRow key={"u"+i} m={m} finished={false} />)}
      {played.length > 0 && <div style={{ height:1, background:"var(--border)" }} />}
      {played.map((m,i) => <MatchRow key={"p"+i} m={m} finished={true} />)}
    </div>
  );
}

// ─── BRACKET TAB ──────────────────────────────────────────────
function BracketTab({ matches }) {
  const [lang] = React.useContext(LangContext);
  const t = T[lang];

  const winners = [];
  const runnersUp = [];
  Object.keys(GROUPS_RAW).forEach(gKey => {
    const gMatches = matches.filter(m => m.groupKey === gKey);
    const standings = calcStandings(GROUPS_RAW[gKey], gMatches);
    winners.push(standings[0].name);
    runnersUp.push(standings[1].name);
  });

  const top8Thirds = ["Denmark", "Turkey", "Nigeria", "Panama", "Germany", "Morocco", "Australia", "Uruguay"];

  const r32Teams = [...winners, ...runnersUp, ...top8Thirds];
  const r16Teams = r32Teams.slice(0, 16);
  const qfTeams = r16Teams.slice(0, 8);
  const sfTeams = qfTeams.slice(0, 4);
  const finalTeams = sfTeams.slice(0, 2);
  const champion = finalTeams[0] || null;

  return (
    <div style={{ overflowX:"auto", background:"var(--surface)", padding:20, borderRadius:12, border:"1px solid var(--border)" }}>
      <div style={{ display:"flex", gap:24, minWidth:900, flexDirection: t.dir==='rtl'?'row-reverse':'row' }}>
        <BracketRound title={t.r32} teams={r32Teams} />
        <BracketRound title={t.r16} teams={r16Teams} />
        <BracketRound title={t.quarter} teams={qfTeams} />
        <BracketRound title={t.semi} teams={sfTeams} />
        <BracketRound title={t.champion} teams={finalTeams} isFinal={true} champion={champion} />
      </div>
    </div>
  );
}

function BracketRound({ title, teams, isFinal, champion }) {
  const [lang] = React.useContext(LangContext);
  const t = T[lang];
  const pairs = [];
  
  if (isFinal) {
    pairs.push([teams[0], teams[1]]);
  } else {
    for (let i = 0; i < teams.length; i += 2) {
      pairs.push([teams[i], teams[i+1]]);
    }
  }

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", gap:16, minWidth:160 }}>
      <h4 style={{ textBreak:"break-all", fontSize:12, color:"var(--text3)", textAlign:"center", borderBottom:"1px solid var(--border)", paddingBottom:6, fontWeight:700 }}>{title}</h4>
      <div style={{ display:"flex", flexDirection:"column", justifyContent:"space-around", flexGrow:1, gap:12 }}>
        {pairs.map((p, idx) => (
          <div key={idx} style={{ background:"var(--bg)", border:"1px solid var(--border2)", borderRadius:8, padding:8, display:"flex", flexDirection:"column", gap:6 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, fontWeight:600 }}>
              <span>{p[0] ? FLAGS[p[0]] : "🏳️"}</span>
              <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p[0] ? tn(lang, p[0]) : "---"}</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, fontWeight:600, borderTop:"1px solid var(--border)", paddingTop:4 }}>
              <span>{p[1] ? FLAGS[p[1]] : "🏳️"}</span>
              <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p[1] ? tn(lang, p[1]) : "---"}</span>
            </div>
          </div>
        ))}
        {isFinal && champion && (
          <div style={{ marginTop:12, background:"color-mix(in srgb, var(--accent) 12%, transparent)", border:"1px solid var(--accent)", borderRadius:8, padding:10, textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:800, color:"var(--accent)", textTransform:"uppercase", marginBottom:4 }}>🏆 {t.champion} 🏆</div>
            <div style={{ fontSize:15, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
              <span>{FLAGS[champion]}</span>
              <span>{tn(lang, champion)}</span>

    </div>
  );
}

// ─── CALC STANDINGS HELPER ────────────────────────────────────
function calcStandings(teams, groupMatches) {
  const map = {};
  teams.forEach(t => { map[t] = { name: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 }; });

  groupMatches.forEach(m => {
    if (m.hg !== null && m.ag !== null) {
      const tH = map[m.home];
      const tA = map[m.away];
      if (tH && tA) {
        tH.p++; tA.p++;
        tH.gf += m.hg; tH.ga += m.ag;
        tA.gf += m.ag; tA.ga += m.hg;
        if (m.hg > m.ag) { tH.w++; tH.pts += 3; tA.l++; }
        else if (m.hg < m.ag) { tA.w++; tA.pts += 3; tH.l++; }
        else { tH.d++; tA.d++; tH.pts += 1; tA.pts += 1; }
      }
    }
  });

  return Object.values(map).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gdA = a.gf - a.ga;
    const gdB = b.gf - b.ga;
    if (gdB !== gdA) return gdB - gdA;
    return b.gf - a.gf;
  }).map(t => ({ ...t, gd: t.gf - t.ga }));
}
