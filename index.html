// البيانات بتوقيت UTC — نحول لتوقيت المتصفح
function toLocalDT(dateStr, timeStr) {
  const [d, mo] = dateStr.split(" ");
  const monthMap = { Jun: "06", Jul: "07" };
  const dayStr = String(parseInt(d)).padStart(2, "0");
  const monthStr = monthMap[mo];
  const time = timeStr.split(" ")[0]; // يشيل أي offset قديم إذا موجود
  return new Date(`2026-${monthStr}-${dayStr}T${time}:00Z`);
}

function fmtDate(lang, date, time) {
  const dt = toLocalDT(date, time);
  const locale = lang === "ar" ? "ar-EG" : lang === "tr" ? "tr-TR" : "en-US";
  return dt.toLocaleDateString(locale, { day: "numeric", month: "short", timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone });
}

function fmtTime(date, time) {
  const dt = toLocalDT(date, time);
  return dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone });
}

function calcStandings(groupKey, lang) {
  const { teams, matches } = GROUPS_RAW[groupKey];
  const st = teams.map(t => ({ key:t, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 }));
  matches.forEach(m => {
    if (m.hg === null || m.ag === null) return;
    const h = m.hg, a = m.ag;
    const ht = st.find(t => t.key === m.home);
    const at = st.find(t => t.key === m.away);
    if (!ht || !at) return;
    ht.p++; at.p++;
    ht.gf += h; ht.ga += a;
    at.gf += a; at.ga += h;
    if (h > a)      { ht.w++; ht.pts += 3; at.l++; }
    else if (a > h) { at.w++; at.pts += 3; ht.l++; }
    else            { ht.d++; ht.pts++; at.d++; at.pts++; }
  });
  st.sort((a,b) => b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf);
  return st;
}

function koLabel(lang, type, group) {
  if (lang === "ar") {
    if (type === "W")  return `أول المجموعة ${group}`;
    if (type === "RU") return `ثاني المجموعة ${group}`;
    if (type === "3")  return `أفضل ثالث (${group})`;
  } else if (lang === "tr") {
    if (type === "W")  return `${group} Gr. 1.`;
    if (type === "RU") return `${group} Gr. 2.`;
    if (type === "3")  return `En iyi 3. (${group})`;
  } else {
    if (type === "W")  return `Winner Grp ${group}`;
    if (type === "RU") return `Runner-up Grp ${group}`;
    if (type === "3")  return `Best 3rd (${group})`;
  }
  return "?";
}

};

function KOCard({ match, accent, lang }) {
  const t = T[lang];
  const ac = accent || "#4a9eff";
  const winner = getWinner(match);

  const sideLabel = (key, type, group) => {
    if (key) return { text: tn(lang, key), flag: FLAGS[key]||"🏳️", isReal: true };
    if (type) return { text: koLabel(lang, type, group), flag: null, isReal: false };
    return { text: t.unknown||"?", flag: null, isReal: false };
  };

  const sides = [
    { ...sideLabel(match.home, match.homeType, match.homeGroup), score:match.hg, pScore:match.pHg, isW:winner===match.home },
    { ...sideLabel(match.away, match.awayType, match.awayGroup), score:match.ag, pScore:match.pAg, isW:winner===match.away },
  ];
  return (
    <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:6, overflow:"hidden", minWidth:138 }}>
      {sides.map((s,si)=>(
        <div key={si} style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"5px 8px", borderBottom:si===0?"1px solid var(--bg2)":"none",
          background:s.isW?"var(--win-bg)":"transparent" }}>
          <span style={{ fontSize: s.isReal?10:9,
            color: s.isReal?(s.isW?"var(--text)":"var(--text2)"):"var(--text4)",
            display:"flex", alignItems:"center", gap:3, overflow:"hidden", whiteSpace:"nowrap" }}>
            {s.flag && <span style={{flexShrink:0}}>{s.flag}</span>}
            <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{s.text}</span>
          </span>
          <span style={{ fontSize:12, fontWeight:700, minWidth:14, textAlign:"center", marginLeft:4,
            color:s.isW?ac:(s.score!==null?"var(--text)":"var(--border)"), display:"flex", alignItems:"center", gap:3 }}>
            {s.pScore!==null && s.pScore!==undefined && <span style={{ fontSize:9, color:"var(--text3)" }}>({s.pScore})</span>}
            {s.score!==null?s.score:"–"}
          </span>
        </div>
      ))}
      {(match.date||match.venue) && (
        <div style={{ padding:"3px 8px", borderTop:"1px solid var(--bg2)", background:"var(--surface2)" }}>
          {match.date && <div style={{ fontSize:9, color:"var(--text3)" }}>{fmtDate(lang, match.date, match.time)} · {fmtTime(match.date, match.time)}</div>}
          {match.venue && <div style={{ fontSize:8, color:"var(--text4)", lineHeight:1.3, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{vn(lang, match.venue)}</div>}
        </div>
      )}
    </div>
  );
}

function BracketCol({ matches, totalHeight, side, accent, lang }) {
  const count = matches.length;
  const slotH = totalHeight/count;
  const CARD_H = 52;
  const LINE_W = 14;
  return (
    <div style={{ position:"relative", width:138, flexShrink:0, height:totalHeight }}>
      {matches.map((m,i)=>{
        const topCenter = slotH*i+slotH/2;
        const isEvenPair = i%2===0;
        return (
          <div key={m.id}>
            <div style={{ position:"absolute", top:topCenter-CARD_H/2, left:0, right:0, zIndex:2 }}>
              <KOCard match={m} accent={accent} lang={lang}/>
            </div>
            <div style={{ position:"absolute", top:topCenter,
              ...(side==="left"?{right:-LINE_W}:{left:-LINE_W}),
              width:LINE_W, height:1, background:"var(--line)", zIndex:1 }}/>
            {isEvenPair&&<div style={{ position:"absolute", top:topCenter,
              ...(side==="left"?{right:-LINE_W}:{left:-LINE_W}),
              width:1, height:slotH, background:"var(--line)", zIndex:1 }}/>}
          </div>
        );
      })}
    </div>
  );
}

function SymmetricBracket({ lang }) {
  const t = T[lang];
  const TOTAL_H=880, GAP=10, CENTER_W=155, colW=138;
  const leftR  = [{key:"L_r32",label:t.r32},{key:"L_r16",label:t.r16},{key:"L_qf",label:t.qf},{key:"L_sf",label:t.sf}];
  const rightR = [{key:"R_r32",label:t.r32},{key:"R_r16",label:t.r16},{key:"R_qf",label:t.qf},{key:"R_sf",label:t.sf}];
  const totalW = (colW+GAP)*8 + CENTER_W + GAP*2;
  return (
    <div style={{ overflowX:"auto", paddingBottom:16, direction:"ltr" }}>
      <div style={{ width:totalW, margin:"0 auto" }}>
        <div style={{ display:"flex", marginBottom:8 }}>
          {leftR.map(({label},i)=>(
            <div key={i} style={{ width:colW, marginRight:GAP, textAlign:"center", fontSize:9, color:"var(--text3)", fontWeight:600 }}>{label}</div>
          ))}
          <div style={{ width:CENTER_W, margin:`0 ${GAP}px` }}/>
          {[...rightR].reverse().map(({label},i)=>(
            <div key={i} style={{ width:colW, marginLeft:GAP, textAlign:"center", fontSize:9, color:"var(--text3)", fontWeight:600 }}>{label}</div>
          ))}
        </div>
        <div style={{ display:"flex", alignItems:"flex-start" }}>
          {leftR.map(({key})=>(
            <div key={key} style={{ marginRight:GAP }}>
              <BracketCol matches={KO[key]} totalHeight={TOTAL_H} side="left" lang={lang}/>
            </div>
          ))}
          <div style={{ width:CENTER_W, flexShrink:0, height:TOTAL_H, display:"flex", flexDirection:"column",
            alignItems:"center", justifyContent:"center", gap:20, margin:`0 ${GAP}px` }}>
            <div style={{ fontSize:10, color:"#f1c40f", fontWeight:700 }}>{t.final}</div>
            <KOCard match={KO.final[0]} accent="#f1c40f" lang={lang}/>
            <div style={{ width:"70%", height:1, background:"var(--border)" }}/>
            <div style={{ fontSize:10, color:"#cd7f32", fontWeight:600 }}>🥉 {t.third}</div>
            <KOCard match={KO.third[0]} accent="#cd7f32" lang={lang}/>
          </div>
          {[...rightR].reverse().map(({key})=>(
            <div key={key} style={{ marginLeft:GAP }}>
              <BracketCol matches={KO[key]} totalHeight={TOTAL_H} side="right" lang={lang}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScheduleTab({ lang }) {
  const isRtl = lang === "ar";
  const t = T[lang];

  const allMatches = [];
  Object.keys(GROUPS_RAW).forEach(gKey => {
    GROUPS_RAW[gKey].matches.forEach(m => {
      allMatches.push({ ...m, groupKey: gKey, stageLabel: null });
    });
  });

  // إضافة مباريات الإقصاءات
  const koStages = [
    { key:"L_r32",  label:"R32" }, { key:"R_r32", label:"R32" },
    { key:"L_r16",  label:"R16" }, { key:"R_r16", label:"R16" },
    { key:"L_qf",   label:"QF"  }, { key:"R_qf",  label:"QF"  },
    { key:"L_sf",   label:"SF"  }, { key:"R_sf",  label:"SF"  },
    { key:"third",  label:"3rd" },
    { key:"final",  label:"Final"},
  ];
  if (window.KO) {
    koStages.forEach(({ key, label }) => {
      (window.KO[key] || []).forEach(m => {
        if (m.date) allMatches.push({ ...m, groupKey: null, stageLabel: label });
      });
    });
  }

  const monthOrder = { "Jun": 6, "Jul": 7 };
  const parseSort = (dateStr, timeStr) => {
    const [d, mo] = dateStr.split(" ");
    const dayNum = parseInt(d, 10);
    const monthNum = monthOrder[mo] || 6;
    const [h, mi] = timeStr.split(":").map(Number);
    return (monthNum * 10000) + (dayNum * 100) + h + (mi / 60);
  };

  allMatches.sort((a, b) => parseSort(a.date, a.time) - parseSort(b.date, b.time));

  const _now = new Date();
  const _isFinished = m => {
    if (m.status === "FINISHED" || (m.hg !== null && m.ag !== null && m.status !== "LIVE" && m.status !== "IN_PLAY")) return true;
    const endDT = new Date(toLocalDT(m.date, m.time).getTime() + 3 * 60 * 60 * 1000);
    return _now >= endDT;
  };
  const _isLive = m => m.status === "LIVE" || m.status === "IN_PLAY";

  const liveMatches     = allMatches.filter(m => _isLive(m));
  const finishedMatches = allMatches.filter(m => !_isLive(m) && _isFinished(m));
  const upcomingMatches = allMatches.filter(m => !_isLive(m) && !_isFinished(m));

  const sortedList = [...liveMatches, ...upcomingMatches, ...finishedMatches];

  const GC_MAP = {};
  Object.keys(GROUPS_RAW).forEach((g, i) => { GC_MAP[g] = GC[i]; });

  const getStaticCountdown = (matchDate, matchTime) => {
    const matchDT = toLocalDT(matchDate, matchTime);
    const diffMs = matchDT - new Date();
    if (diffMs <= 0) return null;
    const diffMins = Math.floor(diffMs / 60000);
    const hours = Math.floor(diffMins / 60);
    const mins = diffMins % 60;
    return { hours, mins };
  };

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
      {sortedList.map((m, i) => {
        const color = m.groupKey ? GC_MAP[m.groupKey] : "#888";
        const now = new Date();
        const matchDT = toLocalDT(m.date, m.time);
        const matchEndDT = new Date(matchDT.getTime() + 3 * 60 * 60 * 1000); // +3 ساعات
        const isLive = m.status === "IN_PLAY" || m.status === "LIVE" ||
          (m.status !== "FINISHED" && now >= matchDT && now < matchEndDT);
        const isFinished = m.status === "FINISHED" || (m.hg !== null && m.ag !== null) ||
          (m.status !== "IN_PLAY" && m.status !== "LIVE" && now >= matchEndDT);
        const isFeatured = i === 0; // المباراة الأولى في القائمة تظهر بشكل متميز دوماً

        const homeWin = isFinished && m.hg > m.ag;
        const awayWin = isFinished && m.ag > m.hg;

        // حساب العداد التنازلي الثابت المرتبط بـ الـ fetch الصامت فقط
        const countdown = (!isLive && !isFinished) ? getStaticCountdown(m.date, m.time) : null;

        return (
          <div 
            key={m.groupKey + i} 
            style={{
              borderRadius: 10, 
              overflow: "hidden", 
              border: isLive ? "2px solid var(--live-pulse)" : (isFeatured && color ? `1px dashed ${color}` : "1px solid var(--border)"),
              boxShadow: isLive ? "0 4px 16px rgba(16, 185, 129, 0.12)" : "none",
              background: "var(--surface)",
              opacity: isFinished ? 0.68 : 1,
              position: "relative",
              transition: "all 0.3s ease"
            }}
          >
            {/* شريط التقدم النبضي للمباراة الـ Live */}
            {isLive && (
              <div style={{ width: "100%", height: "4px", background: "var(--border2)", position: "relative" }}>
                <div 
                  className="live-progress-bar-fill"
                  style={{ 
                    position: "absolute", 
                    top: 0, left: 0, bottom: 0, 
                    width: `${Math.min(100, Math.max(5, ((m.minute || 45) / 90) * 100))}%`, 
                    background: "var(--live-pulse)" 
                  }} 
                />
              </div>
            )}

            <div style={{ padding: isFeatured ? "16px" : "12px 14px" }}>
              {/* السطر العلوي للمعلومات */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "10px", width: "100%" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: "50%",
                    background: color + "33", border: "1px solid " + color + "55",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 10, fontWeight: 700, color,
                  }}>{m.stageLabel || m.groupKey}</div>
                  <div style={{ fontSize: 11, color: "var(--text3)", fontWeight: 600 }}>
                    {fmtDate(lang, m.date, m.time)}
                  </div>
                </div>

                {/* شارات الحالة والعداد المرتبط بالتحديث */}
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>

                  {!isLive && !isFinished && isFeatured && (
                    <span style={{ 
                      background: "var(--bg2)", color: "var(--text3)", 
                      fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 4 
                    }}>{t.notStarted}</span>
                  )}
                  {countdown && isFeatured && (
                    <span style={{ fontSize: 10, color: color, fontWeight: 700, background: color + "14", padding: "2px 6px", borderRadius: 4 }}>
                      ⏳ {t.remaining}: {countdown.hours > 0 ? `${countdown.hours}${t.hour} ` : ""}{countdown.mins}{t.minute}
                    </span>
                  )}
                  <div style={{ fontSize: 9, color: "var(--text4)", maxWidth: 140, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {vn(lang, m.venue)}
                  </div>
                </div>
              </div>

              {/* أطراف المباراة والنتيجة */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", width: "100%", gap: 4, margin: "6px 0" }}>
                <div style={{
                  flex: 1, display: "flex", alignItems: "center",
                  justifyContent: isRtl ? "flex-start" : "flex-end",
                  gap: 8, overflow: "hidden",
                }}>
                  <span style={{
                    fontSize: isFeatured ? 15 : 13, fontWeight: (homeWin || isLive) ? 700 : 400,
                    color: homeWin ? "var(--text)" : (isFinished ? "var(--text3)" : "var(--text)"),

                  }}>{tn(lang, m.home)}</span>
                  <span style={{ flexShrink: 0, fontSize: isFeatured ? 22 : 18 }}>{FLAGS[m.home] || "🏳️"}</span>
                </div>

                {/* كتلة النتيجة المركزية */}
                <div style={{ flexShrink: 0, minWidth: 70, textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center" }}>
                  {(isFinished || isLive) ? (
                    <span style={{
                      display: "inline-flex", alignItems: "center", gap: 6,
                      background: isLive ? "var(--win-bg)" : "var(--bg2)",

                    }}>
                      <span style={{ fontSize: isFeatured ? 18 : 14, fontWeight: 800, color: (isLive || homeWin) ? "var(--text)" : "var(--text2)" }}>{m.hg}</span>
                      <span style={{ fontSize: 11, color: "var(--text4)" }}>–</span>
                      <span style={{ fontSize: isFeatured ? 18 : 14, fontWeight: 800, color: (isLive || awayWin) ? "var(--text)" : "var(--text2)" }}>{m.ag}</span>
                    </span>
                  ) : (
                    <span style={{
                      display: "inline-flex", alignItems: "center",

                  {/* دقائق المباراة Live + منطقة التوسيعات المستقبلية */}
                  {isLive && (

                <div style={{
                  flex: 1, display: "flex", alignItems: "center",
                  justifyContent: isRtl ? "flex-end" : "flex-start",
                  gap: 8, overflow: "hidden",
                }}>
                  <span style={{ flexShrink: 0, fontSize: isFeatured ? 22 : 18 }}>{FLAGS[m.away] || "🏳️"}</span>
                  <span style={{
                    fontSize: isFeatured ? 15 : 13, fontWeight: (awayWin || isLive) ? 700 : 400,
                    color: awayWin ? "var(--text)" : (isFinished ? "var(--text3)" : "var(--text)"),
                    whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                  }}>{tn(lang, m.away)}</span>
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function LastUpdatedTimestamp({ lang }) {
  const [stamp, setStamp] = useState("");

  useEffect(() => {
    const handler = () => {
      if (!window.__lastApiSuccessTime) return;
      const dt = window.__lastApiSuccessTime;
      const timeStr = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      const dateStr = dt.toLocaleDateString(lang === 'ar' ? 'ar-EG' : (lang === 'tr' ? 'tr-TR' : 'en-US'), {
        year: 'numeric', month: 'long', day: 'numeric'
      });
      setStamp(`🕒 ${timeStr}  •  📅 ${dateStr}`);
    };
    
    window.__updateStampComponent = handler;
    handler();
    return () => { window.__updateStampComponent = null; };
  }, [lang]);

  if (!stamp) return null;

  return (
    <div style={{ 
      fontSize: "12px", 
      color: "var(--header-sub)", 
      marginTop: "4px",
      fontWeight: "500",
      letterSpacing: "0.2px"
    }}>
      {stamp}
    </div>
  );
}

        let totalGoals = 0, penGoals = 0, ogGoals = 0, zeroZero = 0;
        const teamScored = {}, teamConceded = {}, playerGoals = {};
        let fastestGoal = null, latestGoal = null, topMatch = null;

        const parseMin = (str) => {
          if (!str) return 0;
          const m = str.match(/(\d+)(?:\+(\d+))?/);
          if (!m) return 0;
          return parseInt(m[1]) + (m[2] ? parseInt(m[2]) : 0);
        };

        matches.forEach(m => {
          const t1 = normalizeTeam(m.team1);
          const t2 = normalizeTeam(m.team2);
          const g1 = m.score.ft[0], g2 = m.score.ft[1];
          const matchTotal = g1 + g2;

          totalGoals += matchTotal;
          if (matchTotal === 0) zeroZero++;

          if (!teamScored[t1]) teamScored[t1] = 0;
          if (!teamScored[t2]) teamScored[t2] = 0;
          if (!teamConceded[t1]) teamConceded[t1] = 0;

          if (!topMatch || matchTotal > topMatch.total) {
            topMatch = { total: matchTotal, t1, t2, g1, g2, date: m.date };
          }

          const allGoals = [
            ...(m.goals1 || []).map(g => ({ ...g, scoringTeam: t1, opponent: t2 })),
            ...(m.goals2 || []).map(g => ({ ...g, scoringTeam: t2, opponent: t1 })),

          allGoals.forEach(g => {
            if (g.penalty) penGoals++;
            if (g.owngoal) { ogGoals++; return; }

            const min = parseMin(g.minute);
            if (!fastestGoal || min < fastestGoal.min) {
              fastestGoal = { min, name: g.name, scoringTeam: g.scoringTeam, opponent: g.opponent, minute: g.minute };
            }
            if (!latestGoal || min > latestGoal.min) {
              latestGoal = { min, name: g.name, scoringTeam: g.scoringTeam, opponent: g.opponent, minute: g.minute };
            }

            if (!playerGoals[g.name]) playerGoals[g.name] = 0;
            playerGoals[g.name]++;
          });
        });

        const finishedMatches = matches.length;
        const avgGoals = finishedMatches > 0 ? (totalGoals / finishedMatches).toFixed(2) : 0;

        const topScorerName = Object.entries(playerGoals).sort((a,b) => b[1]-a[1])[0];
        const topAttackTeam = Object.entries(teamScored).sort((a,b) => b[1]-a[1])[0];

};

function normalizeTeam(name) {
  return OF_TEAM_MAP[name] || name;
}

function buildGoalsData(matches) {
  // teamKey → { players: { playerName → [{ minute, opponent, owngoal, penalty }] } }
  const teams = {};

  matches.forEach(m => {
    if (!m.score) return;
    const t1 = normalizeTeam(m.team1);
    const t2 = normalizeTeam(m.team2);

    const addGoal = (goals, scoringTeam, opponent, isOwnGoal) => {
      if (!goals || !goals.length) return;
      goals.forEach(g => {
        // own goal: يُضاف للفريق الخصم
        const actualTeam = g.owngoal ? opponent : scoringTeam;
        const actualOpponent = g.owngoal ? scoringTeam : opponent;
        if (!teams[actualTeam]) teams[actualTeam] = {};
        const playerName = g.owngoal ? `${g.name} (OG)` : g.name;
        if (!teams[actualTeam][playerName]) teams[actualTeam][playerName] = [];
        teams[actualTeam][playerName].push({
          minute: g.minute,
          opponent: actualOpponent,
          penalty: g.penalty || false,
          owngoal: g.owngoal || false,
        });
      });
    };

    addGoal(m.goals1, t1, t2, false);
    addGoal(m.goals2, t2, t1, false);
  });

  // حوّل لقائمة مرتبة
  return Object.entries(teams)
    .map(([teamKey, players]) => {
      const totalGoals = Object.values(players).reduce((s, g) => s + g.length, 0);
      const playerList = Object.entries(players)
        .map(([name, goals]) => ({ name, goals }))
        .sort((a, b) => b.goals.length - a.goals.length || a.name.localeCompare(b.name));
      return { teamKey, totalGoals, players: playerList };
    })
    .sort((a, b) => b.totalGoals - a.totalGoals || a.teamKey.localeCompare(b.teamKey));
}

  const getKOMatch = (id) => {
    for (const stage of Object.values(window.KO)) {
      const m = stage.find(m => m.id === id);
      if (m) return m;
    }
    return null;
  };

  // ملء QF بالفائزين من R16
  const r16ToQF = {
    "Lqf_0": ["Lr16_0", "Lr16_1"],
    "Lqf_1": ["Lr16_2", "Lr16_3"],
    "Rqf_0": ["Rr16_0", "Rr16_1"],
    "Rqf_1": ["Rr16_2", "Rr16_3"],
  };
  ["L_qf","R_qf"].forEach(stage => {
    (window.KO[stage] || []).forEach(qfMatch => {
      const [homeId, awayId] = r16ToQF[qfMatch.id] || [];
      if (!homeId) return;
      const homeR16 = getKOMatch(homeId);
      const awayR16 = getKOMatch(awayId);
      if (homeR16) { const w = getWinner(homeR16); if (w) qfMatch.home = w; }
      if (awayR16) { const w = getWinner(awayR16); if (w) qfMatch.away = w; }
    });
  });

  // ملء SF بالفائزين من QF
  const qfToSF = {
    "Lsf_0": ["Lqf_0", "Lqf_1"],
    "Rsf_0": ["Rqf_0", "Rqf_1"],
  };
  ["L_sf","R_sf"].forEach(stage => {
    (window.KO[stage] || []).forEach(sfMatch => {
      const [homeId, awayId] = qfToSF[sfMatch.id] || [];
      if (!homeId) return;
      const homeQF = getKOMatch(homeId);
      const awayQF = getKOMatch(awayId);
      if (homeQF) { const w = getWinner(homeQF); if (w) sfMatch.home = w; }
      if (awayQF) { const w = getWinner(awayQF); if (w) sfMatch.away = w; }
    });
  });

  // ملء النهائي ومباراة الثالث
  const lsf = getKOMatch("Lsf_0");
  const rsf = getKOMatch("Rsf_0");
  if (lsf && rsf) {
    const lsfW = getWinner(lsf); const lsfL = lsf.hg !== null ? (lsfW === lsf.home ? lsf.away : lsf.home) : null;
    const rsfW = getWinner(rsf); const rsfL = rsf.hg !== null ? (rsfW === rsf.home ? rsf.away : rsf.home) : null;
    const final = getKOMatch("final_0");
    const third = getKOMatch("third_0");
    if (final) { if (lsfW) final.home = lsfW; if (rsfW) final.away = rsfW; }
    if (third) { if (lsfL) third.home = lsfL; if (rsfL) third.away = rsfL; }
  }

  ["L_r16","R_r16"].forEach(stage => {
    (window.KO[stage] || []).forEach(r16Match => {
      const [homeId, awayId] = r32ToR16[r16Match.id] || [];
      if (!homeId) return;
      const homeR32 = getKOMatch(homeId);
      const awayR32 = getKOMatch(awayId);
      if (homeR32) {
        const w = getWinner(homeR32);
        if (w) r16Match.home = w;
      }
      if (awayR32) {
        const w = getWinner(awayR32);
        if (w) r16Match.away = w;
      }
    });
  });

  // كل مباريات R32 مكتملة
  const allR32 = {
    "Lr32_2": ["Germany",        "Paraguay"],
    "Rr32_1": ["Mexico",         "Ecuador"],
    "Rr32_0": ["England",        "Congo DR"],
    "Lr32_1": ["USA",            "Bosnia and Herzegovina"],
    "Lr32_4": ["Belgium",        "Senegal"],
    "Rr32_4": ["Colombia",       "Ghana"],
    "Rr32_7": ["Switzerland",    "Algeria"],
    "Lr32_5": ["France",         "Sweden"],
    "Lr32_6": ["Portugal",       "Croatia"],
  };
  ["L_r32","R_r32"].forEach(stage => {
    (window.KO[stage] || []).forEach(koMatch => {
      if (allR32[koMatch.id]) {
        koMatch.home = allR32[koMatch.id][0];
        koMatch.away = allR32[koMatch.id][1];
      }
    });
  });
}

async function fetchResults() {
  try {
    const res = await fetch(API_URL, {
      headers: { "X-Auth-Token": API_TOKEN }
    });
    const data = await res.json();

    if (!data.matches) return;

    data.matches.forEach(m => {
      const homeKey = TEAM_MAP[m.homeTeam?.name];
      const awayKey = TEAM_MAP[m.awayTeam?.name];
      if (!homeKey || !awayKey) return;

      const hg = m.score?.fullTime?.home;
      const ag = m.score?.fullTime?.away;
      const pHg = m.score?.penalties?.home;
      const pAg = m.score?.penalties?.away;
      const status = m.status || "SCHEDULED";
      const minute = m.minute || null;
      const injuryTime = m.injuryTime || null;

      // 1. تحديث المجموعات
      Object.values(GROUPS_RAW).forEach(group => {
        group.matches.forEach(match => {
          if (match.home === homeKey && match.away === awayKey) {
            match.status = status;
            match.minute = minute;
            match.injuryTime = injuryTime;
            if (hg !== null && ag !== null && hg !== undefined) {
              match.hg = hg;
              match.ag = ag;
            }
          }
        });
      });

      // 2. تحديث الإقصائيات
      if (m.stage && m.stage !== "GROUP_STAGE") {
        Object.values(KO).forEach(stageMatches => {
          stageMatches.forEach(koMatch => {
            if (koMatch.home === homeKey && koMatch.away === awayKey) {
              
              koMatch.home = homeKey;
              koMatch.away = awayKey;
              koMatch.status = status;
              koMatch.minute = minute;
              koMatch.injuryTime = injuryTime;

              if (hg !== null && ag !== null && hg !== undefined) {
                koMatch.hg = hg;
                koMatch.ag = ag;
              }
              if (pHg !== null && pAg !== null && pHg !== undefined) {
                koMatch.pHg = pHg;
                koMatch.pAg = pAg;
              }
            }
          });
        });
      }
    });

    window.__lastApiSuccessTime = new Date();
    if (window.__updateStampComponent) window.__updateStampComponent();
    fillKOFromStandings();

    // 3. تحديث الإقصائيات مرة ثانية بعد fillKOFromStandings (عشان R16+ تتطابق)
    data.matches.forEach(m => {
      if (!m.stage || m.stage === "GROUP_STAGE") return;
      const homeKey = TEAM_MAP[m.homeTeam?.name];
      const awayKey = TEAM_MAP[m.awayTeam?.name];
      if (!homeKey || !awayKey) return;
      const hg = m.score?.fullTime?.home;
      const ag = m.score?.fullTime?.away;
      const pHg = m.score?.penalties?.home;
      const pAg = m.score?.penalties?.away;
      const status = m.status || "SCHEDULED";
      Object.values(KO).forEach(stageMatches => {
        stageMatches.forEach(koMatch => {
          if (koMatch.home === homeKey && koMatch.away === awayKey) {
            koMatch.status = status;
            if (hg !== null && ag !== null && hg !== undefined) {
              koMatch.hg = hg;
              koMatch.ag = ag;
            }
            if (pHg !== null && pAg !== null && pHg !== undefined) {
              koMatch.pHg = pHg;
              koMatch.pAg = pAg;
            }
          }
        });
      });
    });

    window.__forceUpdate && window.__forceUpdate();

  } catch (err) {
    console.error("Fetch error:", err);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  fetchResults();
  autoUpdateInterval = setInterval(fetchResults, 60000); // تحديث صامت كل دقيقة
});
</script>
